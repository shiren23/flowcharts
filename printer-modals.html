<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留痕打印 - 弹窗界面</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #FFFFFF;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
    gap: 40px;
    flex-wrap: wrap;
  }

  /* 手机外框 */
  .phone-frame {
    width: 375px;
    height: 720px;
    background: #FFFFFF;
    border-radius: 40px;
    border: 8px solid #1a1a1a;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
  }

  /* 状态栏 */
  .status-bar {
    height: 44px;
    padding: 12px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-weight: 600;
    color: #1a1a1a;
    flex-shrink: 0;
  }
  .status-bar .time { font-size: 14px; font-weight: 700; }
  .status-icons { display: flex; gap: 4px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; }

  /* 导航栏 */
  .nav-bar {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-bottom: 0.5px solid #EEEEEE;
    flex-shrink: 0;
  }
  .nav-bar .back-btn {
    position: absolute;
    left: 16px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-bar .back-btn svg { width: 20px; height: 20px; color: #333; }
  .nav-bar .title {
    font-size: 17px;
    font-weight: 600;
    color: #1a1a1a;
  }

  /* 打印机状态卡片 */
  .printer-card {
    background: #FFFFFF;
    border: 1px solid #F0F0F0;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .printer-icon {
    width: 48px;
    height: 48px;
    background: #F3EFFF;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .printer-icon svg { width: 26px; height: 26px; color: #7B61FF; }
  .printer-info { flex: 1; }
  .printer-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
  .printer-status { font-size: 13px; color: #999; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 4px;
  }
  .status-dot.online { background: #52C41A; }
  .status-dot.busy { background: #FAAD14; }

  /* 操作按钮区 */
  .action-area { margin-top: 8px; }
  .action-btn {

  }

    text-align: center;
    padding: 16px 0 0;
    font-size: 13px;
    color: #999;
    letter-spacing: 1px;
  }
</style>
</head>
